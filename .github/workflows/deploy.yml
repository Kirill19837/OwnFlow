name: Deploy to production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'pitch/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SECRET_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SECRET_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECRET_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          host: ${{ vars.HOST_DEPLOY_IP }}
          username: ${{ vars.HOST_USER }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          envs: SECRET_SUPABASE_URL,SECRET_SUPABASE_SERVICE_ROLE_KEY,SECRET_OPENAI_API_KEY,SECRET_ANTHROPIC_API_KEY,SECRET_VITE_SUPABASE_ANON_KEY
          script: |
            set -e

            # ── Clone or update repo ────────────────────────────
            if [ ! -d "/home/kirill/ownflow/.git" ]; then
              git clone https://github.com/Kirill19837/OwnFlow.git /home/kirill/ownflow
            fi
            cd /home/kirill/ownflow
            git fetch origin main
            git reset --hard origin/main

            # ── Write backend .env ──────────────────────────────
            printf 'SUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nOPENAI_API_KEY=%s\nANTHROPIC_API_KEY=%s\nCORS_ORIGINS=https://ownflow.21century.tech\n' \
              "$SECRET_SUPABASE_URL" "$SECRET_SUPABASE_SERVICE_ROLE_KEY" "$SECRET_OPENAI_API_KEY" "$SECRET_ANTHROPIC_API_KEY" \
              > backend/.env

            # ── Write frontend build args env ───────────────────
            printf 'VITE_API_URL=https://ownflow.21century.tech/api\nVITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\n' \
              "$SECRET_SUPABASE_URL" "$SECRET_VITE_SUPABASE_ANON_KEY" \
              > .env.prod

            # ── Force-kill any containers we can't stop normally ──
            sudo docker rm -f ownflow-backend-1 ownflow-frontend-1 2>/dev/null || true

            # ── Remove broken buildx plugin if present ──────────
            sudo rm -f /root/.docker/cli-plugins/docker-buildx

            # ── Build and restart ───────────────────────────────
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod \
              down --remove-orphans 2>/dev/null || true
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --build --remove-orphans

            # ── Cleanup ─────────────────────────────────────────
            sudo docker image prune -f
            rm -f .env.prod
